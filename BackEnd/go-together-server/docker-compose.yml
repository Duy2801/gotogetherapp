services:
  postgres:
    image: postgres:16-alpine
    container_name: go-together-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: go_together
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d go_together"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
